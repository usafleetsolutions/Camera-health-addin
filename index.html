<!DOCTYPE html>
<html lang="en" style="height:100%;margin:0;padding:0;">
<head>
<meta charset="UTF-8" />
<title>USA Fleet Camera Health</title>
<style>
  /* Kept as a fallback for contexts where inline styles below aren't overridden by
     something else (e.g. the standalone isolation test) -- but the inline style="..."
     attributes on each element are the ones that actually matter. MyGeotab appears to
     mirror/clone this page's rendered DOM nodes into its own page rather than showing
     our iframe directly (confirmed via pilot testing on hunt_sons, 2026-07-08 -- every
     change made only in this <style> block had zero visual effect, even after
     confirming via curl that the updated CSS was actually live). Node clones carry
     inline styles with them; they do not carry a separate stylesheet's rules. */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    color: #2b2b2b;
    background: #ffffff;
  }
</style>
</head>
<body style="height:100%;margin:0;padding:0;">
  <div id="usafsCameraHealthRoot" style="display:flex;flex-direction:column;min-height:600px;box-sizing:border-box;padding:12px 16px 16px 16px;font-family:-apple-system,'Segoe UI',Arial,sans-serif;color:#2b2b2b;">
    <div style="padding:24px 8px;font-size:14px;color:#555;line-height:1.5;">Loading your camera health report…</div>
  </div>
  <script src="addin.js"></script>
</body>
</html>
